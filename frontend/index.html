<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      try {
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
        else if (window.matchMedia('(prefers-color-scheme: light)').matches)
          document.documentElement.setAttribute('data-theme', 'light');
        else
          document.documentElement.setAttribute('data-theme', 'dark');
      } catch(e) {}
    </script>

    <!-- Google Translate: gizli widget, buton ile programatik kontrol edilir -->
    <style>
      /* Google Translate araç çubuğunu gizle */
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0 !important; }
      /* Çeviri tooltip'ini gizle */
      .goog-te-menu-frame, #goog-gt-tt { display: none !important; }
      /* Çevrilen metnin alt çizgisini kaldır */
      font[style*="background-color:"] { background-color: transparent !important; }
      .goog-te-gadget { display: none !important; }
    </style>
  </head>
  <body>
    <!-- Gizli Google Translate konteyneri -->
    <div id="google_translate_element" style="display:none;position:absolute;top:-9999px"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Translate init -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'tr',
          includedLanguages: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
