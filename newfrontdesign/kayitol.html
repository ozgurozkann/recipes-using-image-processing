<script>
        // Simple Micro-interactions
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('mouseenter', () => {
                // Potential for haptic-like visual feedback or sound
            });
        });

        // Toggle Password Visibility Logic
        const passToggle = document.querySelector('.relative button');
        const passInput = document.querySelector('#password');
        if(passToggle && passInput) {
            passToggle.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                passToggle.innerHTML = `<span class="material-symbols-outlined">${isPass ? 'visibility_off' : 'visibility'}</span>`;
            });
        }
    </script>
